<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortana Interface v4.6</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body { background-color: #050505; color: #00ffff; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { border: 2px solid #00ffff; padding: 20px; background-color: #0a0a0a; box-shadow: 0 0 15px #00ffff; width: 100%; max-width: 500px; box-sizing: border-box; }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; border-bottom: 1px dashed #00ffff; padding-bottom: 10px; }
        #canvas-3d { width: 100%; height: 300px; border: 1px solid #00ffff; margin-bottom: 15px; background-color: #000; display: flex; justify-content: center; align-items: center; }
        model-viewer { width: 100%; height: 100%; }
        .section { border: 1px dotted #00ffff; padding: 10px; margin-bottom: 15px; }
        .section-title { font-size: 0.8em; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        input, textarea, button { width: 100%; background-color: #000; border: 1px solid #00ffff; color: #00ffff; padding: 10px; margin-bottom: 5px; box-sizing: border-box; font-family: inherit; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background-color: #00ffff; color: #000; }
        #response { margin-top: 15px; padding: 10px; border: 1px solid #00ffff; min-height: 50px; background-color: #000; white-space: pre-wrap; }
        .error { color: #ff3333 !important; border-color: #ff3333 !important; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cortana System v4.6</h2>
    <div id="canvas-3d"><div id="placeholder-text">Nessun modello caricato</div></div>
    
    <div class="section">
        <div class="section-title">Parametri Cognitivi (Gemini)</div>
        <input type="password" id="api-key" placeholder="Incolla qui la tua API Key...">
    </div>

    <input type="file" id="file-input" accept=".glb">
    <button type="button" onclick="document.getElementById('file-input').click()">Carica Modello .GLB</button>
    
    <textarea id="prompt" rows="3" placeholder="Invia un messaggio tattico..."></textarea>
    <button type="button" onclick="inviaTrasmissione()">Invia Trasmissione</button>

    <div id="response">In attesa di ordini...</div>
</div>

<script>
    document.getElementById('file-input').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            document.getElementById('canvas-3d').innerHTML = `<model-viewer id="cortana-avatar" src="${url}" camera-controls shadow-intensity="1" environment-image="neutral" exposure="1.0" autoplay></model-viewer>`;
            
            const viewer = document.getElementById('cortana-avatar');
            viewer.addEventListener('load', () => {
                if (viewer.availableAnimations && viewer.availableAnimations.length > 0) {
                    viewer.animationName = viewer.availableAnimations[0];
                    viewer.play();
                } else {
                    viewer.autoRotate = true;
                }
            });
        }
    });

    async function inviaTrasmissione() {
        const key = document.getElementById('api-key').value.trim();
        const text = document.getElementById('prompt').value.trim();
        const resDiv = document.getElementById('response');

        if (!key || !text) { resDiv.innerHTML = "<span class='error'>Errore: API Key o messaggio mancante!</span>"; return; }
        resDiv.innerHTML = "<b>Cortana:</b> <i>Elaborazione...</i>";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Rispondi come Cortana di Halo, in italiano, breve e ironica: " + text }] }] })
            });
            const data = await res.json();
            const risposta = data.candidates[0].content.parts[0].text;
            resDiv.innerHTML = "<b>Cortana:</b> " + risposta;

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(risposta);
                u.lang = 'it-IT';
                u.pitch = 1.25;
                const voices = window.speechSynthesis.getVoices();
                u.voice = voices.find(v => v.name.includes("Alice") || v.name.includes("Elsa") || v.name.includes("Federica")) || voices.find(v => v.lang.includes('it'));
                window.speechSynthesis.speak(u);
            }
        } catch (e) { resDiv.innerHTML = "<span class='error'>Errore di trasmissione.</span>"; }
    }
</script>
</body>
</html>
