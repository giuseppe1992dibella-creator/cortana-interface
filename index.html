<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortana Interface v3.9</title>
    <style>
        body {
            background-color: #050505;
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            border: 2px solid #00ffff;
            padding: 20px;
            background-color: #0a0a0a;
            box-shadow: 0 0 15px #00ffff;
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            border-bottom: 1px dashed #00ffff;
            padding-bottom: 10px;
        }
        .section {
            border: 1px dotted #00ffff;
            padding: 10px;
            margin-bottom: 15px;
        }
        .section-title {
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        input, textarea, button {
            width: 100%;
            background-color: #000;
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 10px;
            margin-bottom: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            background-color: #051a1a;
        }
        button {
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #00ffff;
            color: #000;
        }
        #response {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #00ffff;
            min-height: 50px;
            background-color: #000;
            white-space: pre-wrap;
        }
        .error {
            color: #ff3333 !important;
            border-color: #ff3333 !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Cortana System v3.9</h2>
    
    <div class="section">
        <div class="section-title">Parametri Cognitivi (Gemini)</div>
        <input type="password" id="api-key" placeholder="Inserisci la tua API Key di Gemini...">
    </div>

    <div class="section">
        <div class="section-title">Parametri Vocali Neurali (ElevenLabs)</div>
        <input type="password" id="eleven-key" placeholder="Inserisci ElevenLabs API Key (Opzionale)...">
        <input type="text" id="voice-id" placeholder="Inserisci Voice ID (Opzionale)...">
    </div>

    <button type="button" id="btn-glb">Carica Modello .GLB</button>
    
    <textarea id="prompt" rows="3" placeholder="Invia un messaggio tattico..."></textarea>
    
    <button type="button" id="btn-invia" onclick="inviaTrasmissione()">Invia Trasmissione</button>

    <div id="response">In attesa di ordini...</div>
</div>

<script>
    async function inviaTrasmissione() {
        const keyInput = document.getElementById('api-key').value.trim();
        const elKeyInput = document.getElementById('eleven-key').value.trim();
        const voiceIdInput = document.getElementById('voice-id').value.trim();
        const textInput = document.getElementById('prompt').value.trim();
        const resDiv = document.getElementById('response');

        if (!keyInput || !textInput) {
            resDiv.innerHTML = "<span class='error'>Errore: Chiave API e Messaggio sono obbligatori!</span>";
            return;
        }

        resDiv.classList.remove('error');
        resDiv.innerHTML = "<b>Cortana:</b> <i>Elaborazione in corso...</i>";
        document.getElementById('prompt').value = "";

        const promptFuso = `Tu sei Cortana di Halo, l'IA tattica di supporto dell'utente. Sei militare, leale e ironica. Rispondi in italiano in modo breve e conciso al seguente messaggio: ${textInput}`;

        try {
            // Chiamata ufficiale a Gemini con endpoint v1beta corretto e variabile allineata
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${keyInput}`, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptFuso }] }] })
            });

            if (!res.ok) throw new Error("Risposta KO dal server Google");

            const data = await res.json();
            const testoRisposta = data.candidates[0].content.parts[0].text;
            resDiv.innerHTML = "<b>Cortana:</b> " + testoRisposta;

            // Se sono presenti i dati per ElevenLabs, avvia la sintesi vocale
            if (elKeyInput && voiceIdInput) {
                resDiv.innerHTML += "<br><small style='color:#00ffff;'>[Generazione voce con ElevenLabs...]</small>";
                
                const ttsRes = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceIdInput}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'xi-api-key': elKeyInput
                    },
                    body: JSON.stringify({
                        text: testoRisposta,
                        model_id: "eleven_multilingual_v2",
                        voice_settings: { stability: 0.5, similarity_boost: 0.75 }
                    })
                });

                if (ttsRes.ok) {
                    const audioBlob = await ttsRes.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                } else {
                    resDiv.innerHTML += "<br><span class='error'><small>[Errore sintesi vocale ElevenLabs]</small></span>";
                }
            }

        } catch (error) {
            console.error(error);
            resDiv.classList.add('error');
            resDiv.innerHTML = "Errore di rete o chiave non abilitata. Controlla la console del browser (F12).";
        }
    }

    // Bottone segnaposto per il modello 3D GLB
    document.getElementById('btn-glb').addEventListener('click', () => {
        alert('Funzionalità di caricamento modello .GLB pronta per l\'integrazione con Three.js / Model-Viewer.');
    });
</script>

</body>
</html>
