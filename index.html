<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortana Interface v4.5</title>
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https: blob: data:;">

    <!-- Motore grafico per i file .GLB -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body { background-color: #050505; color: #00ffff; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { border: 2px solid #00ffff; padding: 20px; background-color: #0a0a0a; box-shadow: 0 0 15px #00ffff; width: 100%; max-width: 500px; box-sizing: border-box; }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; border-bottom: 1px dashed #00ffff; padding-bottom: 10px; }
        #canvas-3d { width: 100%; height: 300px; border: 1px solid #00ffff; margin-bottom: 15px; background-color: #000; display: flex; justify-content: center; align-items: center; }
        model-viewer { width: 100%; height: 100%; }
        .section { border: 1px dotted #00ffff; padding: 10px; margin-bottom: 15px; }
        .section-title { font-size: 0.8em; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        input, textarea, button { width: 100%; background-color: #000; border: 1px solid #00ffff; color: #00ffff; padding: 10px; margin-bottom: 5px; box-sizing: border-box; font-family: inherit; }
        input:focus, textarea:focus { outline: none; background-color: #051a1a; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background-color: #00ffff; color: #000; }
        #response { margin-top: 15px; padding: 10px; border: 1px solid #00ffff; min-height: 50px; background-color: #000; white-space: pre-wrap; }
        .error { color: #ff3333 !important; border-color: #ff3333 !important; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cortana System v4.5</h2>
    
    <div id="canvas-3d">
        <div id="placeholder-text">Nessun modello caricato</div>
    </div>
    
    <div class="section">
        <div class="section-title">Parametri Cognitivi (Gemini)</div>
        <input type="password" id="api-key" placeholder="Incolla qui la tua API Key di Gemini...">
    </div>

    <input type="file" id="file-input" accept=".glb">
    <button type="button" id="btn-glb" onclick="document.getElementById('file-input').click()">Carica Modello .GLB</button>
    
    <textarea id="prompt" rows="3" placeholder="Invia un messaggio tattico..."></textarea>
    <button type="button" id="btn-invia" onclick="inviaTrasmissione()">Invia Trasmissione</button>

    <div id="response">In attesa di ordini...</div>
</div>

<script>
    let elencoVoci = [];

    // Funzione per caricare e mappare le voci di sistema disponibili nel browser
    function caricaVoci() {
        if ('speechSynthesis' in window) {
            elencoVoci = window.speechSynthesis.getVoices();
        }
    }
    caricaVoci();
    if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = caricaVoci;
    }

    document.getElementById('file-input').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            
            // Iniezione del modello con impostazioni di illuminazione standard ed esposizione bilanciata per evitare l'effetto bianco
            document.getElementById('canvas-3d').innerHTML = `
                <model-viewer id="cortana-avatar" src="${url}" camera-controls shadow-intensity="1" environment-image="neutral" exposure="1.0" autoplay></model-viewer>
            `;

            // Rilevamento automatico delle animazioni interne al file .GLB appena caricato
            const viewer = document.getElementById('cortana-avatar');
            viewer.addEventListener('load', () => {
                const animazioni = viewer.availableAnimations;
                console.log("Animazioni trovate nel file:", animazioni);
                if (animazioni && animazioni.length > 0) {
                    // Imposta ed esegue la prima animazione disponibile nell'elenco
                    viewer.animationName = animazioni[0];
                    viewer.play();
                } else {
                    console.log("Nessuna animazione trovata nel file .glb. Attivata rotazione automatica di ripiego.");
                    viewer.autoRotate = true;
                }
            });
        }
    });

    async function inviaTrasmissione() {
        const keyInput = document.getElementById('api-key').value.trim();
        const textInput = document.getElementById('prompt').value.trim();
        const resDiv = document.getElementById('response');

        if (!keyInput || !textInput) {
            resDiv.innerHTML = "<span class='error'>Errore: Incolla l'API Key e inserisci un messaggio!</span>";
            return;
        }

        resDiv.classList.remove('error');
        resDiv.innerHTML = "<b>Cortana:</b> <i>Elaborazione in corso...</i>";

        const promptFuso = `Tu sei Cortana di Halo, l'IA tattica di supporto dell'utente. Sei militare, leale e ironica. Rispondi in italiano in modo breve (massimo due frasi): ${textInput}`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${keyInput}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptFuso }] }] })
            });

            if (!res.ok) {
                const fallbackRes = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent?key=${keyInput}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptFuso }] }] })
                });
                if (!fallbackRes.ok) throw new Error("Risposta KO dal server Google.");
                var data = await fallbackRes.json();
            } else {
                var data = await res.json();
            }

            const testoRisposta = data.candidates[0].content.parts[0].text;
            resDiv.innerHTML = "<b>Cortana:</b> " + testoRisposta;
            document.getElementById('prompt').value = "";

            // GESTIONE VOCE LOCALE - FORZATURA FEMMINILE RIGIDA
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Interrompe code audio pendenti

                const utterance = new SpeechSynthesisUtterance(testoRisposta);
                utterance.lang = 'it-IT';
                utterance.rate = 1.05; // Velocità leggermente aumentata per renderla più fluida e naturale
                utterance.pitch = 1.15; // Tonalità alzata per rendere femminile la frequenza della voce

                // Ricarica le voci per sicurezza
                if (elencoVoci.length === 0) elencoVoci = window.speechSynthesis.getVoices();

                // Algoritmo di selezione: cerca esplicitamente le varianti femminili italiane note nei vari sistemi operativi
                let voceFemminile = elencoVoci.find(v => v.lang.includes('it') && 
                    (v.name.toLowerCase().includes('elsa') || 
                     v.name.toLowerCase().includes('alice') || 
                     v.name.toLowerCase().includes('federica') || 
                     v.name.toLowerCase().includes('zira') || 
                     v.name.toLowerCase().includes('cosmo'))) 
                     || elencoVoci.find(v => v.lang.includes('it')); // Ripiego su voce italiana generica se non trova i nomi specifici

                if (voceFemminile) {
                    utterance.voice = voceFemminile;
                    console.log("Voce caricata:", voceFemminile.name);
                }

                window.speechSynthesis.speak(utterance);
                resDiv.innerHTML += "<br><small style='color:#00ff00;'>[Audio riprodotto via sistema locale]</small>";
            }

        } catch (error) {
            console.error(error);
            resDiv.classList.add('error');
            resDiv.innerHTML = error.message;
        }
    }
</script>
</body>
</html>
